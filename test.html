<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test — Godtfolk Pizzabar</title>
<style>
:root{--green:#1a6b3c;--green-dark:#155730;--cream:#f2f2ef;--white:#fff;--ink:#141412;--mid:#5a5a55;--border:#e0e0db}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;font-family:Arial,sans-serif;background:var(--cream);color:var(--ink);display:grid;place-items:center;padding:24px}
.wrap{width:min(560px,100%);background:var(--white);border:1px solid var(--border);border-radius:8px;padding:28px;box-shadow:0 18px 50px rgba(0,0,0,.08)}
a{color:var(--green);text-decoration:none;font-size:14px}
h1{font-size:30px;line-height:1.1;margin:18px 0 10px}
p{color:var(--mid);line-height:1.6;margin-bottom:20px}
button{width:100%;border:0;border-radius:8px;background:var(--green);color:var(--white);font-size:16px;font-weight:700;padding:14px 18px;cursor:pointer}
button:hover{background:var(--green-dark)}
button:disabled{opacity:.7;cursor:wait}
pre{display:none;margin-top:18px;padding:16px;border-radius:8px;background:#111;color:#f3f3f3;white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.45}
.ok{color:#78e08f}.err{color:#ff8a8a}
</style>
</head>
<body>
<main class="wrap">
  <a href="/">Tilbage</a>
  <h1>Godtfolk Pizzabar test</h1>
  <p>Den gamle testsiden er erstattet af WebRTC-testen.</p>
  <button id="testBtn" type="button">Test</button>
  <pre id="result"></pre>
</main>

<script>
const btn = document.getElementById('testBtn');
const result = document.getElementById('result');

function show(message, ok = false) {
  result.style.display = 'block';
  result.className = ok ? 'ok' : 'err';
  result.textContent = message;
}

btn.addEventListener('click', async () => {
  btn.disabled = true;
  btn.textContent = 'Tester...';
  window.location.href = '/realtime.html';
});
</script>
</body>
</html>
