<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo-forespørgsler — Zeppo</title>
<style>
body {
  margin: 0;
  background: #f9fafb;
  color: #111827;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
main {
  width: min(1100px, calc(100vw - 32px));
  margin: 0 auto;
  padding: 36px 0;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 24px;
}
h1 {
  margin: 0;
  font-size: 32px;
}
a, button {
  border: 1px solid #d1d5db;
  border-radius: 8px;
  background: #fff;
  color: #111827;
  padding: 10px 14px;
  text-decoration: none;
  font: inherit;
  cursor: pointer;
}
button {
  background: #16a34a;
  border-color: #16a34a;
  color: #fff;
  font-weight: 700;
}
.actions {
  display: flex;
  gap: 10px;
}
.empty, .lead {
  border: 1px solid #d1d5db;
  border-radius: 8px;
  background: #fff;
}
.empty {
  padding: 28px;
  color: #6b7280;
}
.grid {
  display: grid;
  gap: 14px;
}
.lead {
  padding: 18px;
}
.lead-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
}
.lead h2 {
  margin: 0 0 4px;
  font-size: 20px;
}
.time {
  color: #6b7280;
  font-size: 13px;
  white-space: nowrap;
}
.fields {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px 18px;
}
.field span {
  display: block;
  margin-bottom: 3px;
  color: #6b7280;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.field a {
  display: inline;
  border: none;
  padding: 0;
  color: #15803d;
  background: transparent;
}
.message {
  grid-column: span 2;
  white-space: pre-wrap;
}
@media (max-width: 700px) {
  header, .lead-top { display: block; }
  .actions { margin-top: 14px; }
  .fields { grid-template-columns: 1fr; }
  .message { grid-column: auto; }
}
</style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>Demo-forespørgsler</h1>
      <p id="count">Henter...</p>
    </div>
    <div class="actions">
      <a href="index.html">Forside</a>
      <button onclick="loadLeads()">Opdater</button>
    </div>
  </header>
  <section id="leads" class="grid"></section>
</main>

<script>
const leadsEl = document.getElementById('leads');
const countEl = document.getElementById('count');

function formatDate(value) {
  return new Intl.DateTimeFormat('da-DK', {
    dateStyle: 'short',
    timeStyle: 'short'
  }).format(new Date(value));
}

function safe(value) {
  return value && value !== 'Ikke oplyst' ? value : '-';
}

async function loadLeads() {
  leadsEl.innerHTML = '';
  countEl.textContent = 'Henter...';

  try {
    const response = await fetch('/api/demo-leads');
    const data = await response.json();
    if (!data.ok) throw new Error(data.error || 'Fejl');

    countEl.textContent = `${data.leads.length} forespørgsel${data.leads.length === 1 ? '' : 'er'}`;

    if (data.leads.length === 0) {
      leadsEl.innerHTML = '<div class="empty">Der er ingen demo-forespørgsler endnu.</div>';
      return;
    }

    leadsEl.innerHTML = data.leads.map((lead) => `
      <article class="lead">
        <div class="lead-top">
          <div>
            <h2>${safe(lead.company)}</h2>
            <div>${safe(lead.name)}</div>
          </div>
          <div class="time">${formatDate(lead.createdAt)}</div>
        </div>
        <div class="fields">
          <div class="field"><span>Telefon</span><a href="tel:${safe(lead.phone)}">${safe(lead.phone)}</a></div>
          <div class="field"><span>Email</span><a href="mailto:${safe(lead.email)}">${safe(lead.email)}</a></div>
          <div class="field message"><span>Besked</span>${safe(lead.message)}</div>
        </div>
      </article>
    `).join('');
  } catch (error) {
    countEl.textContent = 'Kunne ikke hente forespørgsler';
    leadsEl.innerHTML = '<div class="empty">Der skete en fejl. Prøv at opdatere siden.</div>';
  }
}

loadLeads();
</script>
</body>
</html>
