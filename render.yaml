services:
  - type: web
    name: godtfolk-voice-agent
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false
      - key: CARTESIA_VOICE_ID
        sync: false
      - key: CARTESIA_MODEL_ID
        value: sonic-3.5
      - key: CARTESIA_VERSION
        value: 2026-03-01
