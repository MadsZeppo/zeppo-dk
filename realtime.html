<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anja - Godtfolk Pizzabar</title>
<style>
:root{--green:#1a6b3c;--green-dark:#155730;--cream:#f2f2ef;--white:#fff;--ink:#141412;--mid:#5a5a55;--muted:#8a8a82;--border:#deded8;--blue:#1f5eff;--red:#c0392b}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;font-family:Arial,sans-serif;background:var(--cream);color:var(--ink);padding:24px;display:grid;place-items:center}
.app{width:min(620px,100%);background:var(--white);border:1px solid var(--border);border-radius:8px;box-shadow:0 18px 50px rgba(0,0,0,.08);overflow:hidden}
.top{padding:22px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px}
.back{font-size:14px;color:var(--green);text-decoration:none;white-space:nowrap}
h1{font-size:28px;line-height:1.1;margin-bottom:6px}
.subtitle{font-size:14px;color:var(--mid)}
.content{padding:24px}
.status{padding:12px 14px;border-radius:8px;background:#f1f1ee;color:var(--mid);font-size:13px;font-weight:700;text-align:center;margin-bottom:16px}
.status.loading{background:#fff4d6;color:#846200}
.status.connected{background:#ddf4e6;color:var(--green)}
.status.error{background:#ffe3e0;color:var(--red)}
.transcript{height:300px;overflow:auto;background:#f8f8f5;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px}
.empty{height:100%;display:grid;place-items:center;color:var(--muted);font-size:13px;text-align:center}
.msg{padding:10px 12px;border-radius:8px;margin-bottom:10px;border-left:3px solid var(--border);background:var(--white)}
.msg.user{border-left-color:var(--blue);background:#eef4ff}
.msg.assistant{border-left-color:var(--green);background:#eef8f2}
.role{font-size:11px;text-transform:uppercase;letter-spacing:.04em;font-weight:800;color:var(--muted);margin-bottom:5px}
.text{font-size:14px;line-height:1.5;color:var(--ink);white-space:pre-wrap}
.debug{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.pill{border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--mid);background:#fbfbf8}
.pill strong{color:var(--ink)}
.mode{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:16px;font-size:13px;color:var(--mid)}
.mode select{border:1px solid var(--border);border-radius:8px;background:var(--white);padding:8px 10px;color:var(--ink)}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{border:0;border-radius:8px;padding:14px 16px;font-size:15px;font-weight:800;color:var(--white);cursor:pointer}
button:disabled{background:#c8c8c2;cursor:not-allowed}
.start{background:var(--green)}
.start:not(:disabled):hover{background:var(--green-dark)}
.stop{background:var(--red)}
.hint{font-size:12px;line-height:1.6;color:var(--muted);text-align:center;margin-top:16px}
@media(max-width:520px){body{padding:12px}.top{align-items:flex-start;flex-direction:column}.content{padding:18px}.actions,.debug{grid-template-columns:1fr}.transcript{height:260px}}
</style>
</head>
<body>
<main class="app">
  <div class="top">
    <div>
      <h1>Anja</h1>
      <p class="subtitle">Godtfolk Pizzabar - OpenAI Realtime</p>
    </div>
    <a class="back" href="/">Tilbage til Zeppo</a>
  </div>
  <div class="content">
    <div id="status" class="status">Klar til at starte</div>
    <div class="mode">
      <span>Voice output</span>
      <select id="voiceMode">
        <option value="elevenlabs" selected>ElevenLabs</option>
        <option value="openai">OpenAI</option>
      </select>
    </div>
    <div class="debug">
      <div class="pill">OpenAI: <strong id="openaiState">idle</strong></div>
      <div class="pill">ElevenLabs: <strong id="ttsState">idle</strong></div>
      <div class="pill">Input: <strong id="listenState">idle</strong></div>
      <div class="pill">Latency: <strong id="latencyState">-</strong></div>
    </div>
    <div id="transcript" class="transcript">
      <div class="empty">Samtalen vises her.</div>
    </div>
    <div class="actions">
      <button id="startBtn" class="start" type="button">Start samtale</button>
      <button id="stopBtn" class="stop" type="button" disabled>Stop</button>
    </div>
    <p class="hint">Tryk Start samtale, tillad mikrofon, og tal naturligt til Anja.</p>
  </div>
</main>

<script>
const statusEl = document.getElementById('status');
const transcriptEl = document.getElementById('transcript');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const voiceModeEl = document.getElementById('voiceMode');
const openaiStateEl = document.getElementById('openaiState');
const ttsStateEl = document.getElementById('ttsState');
const listenStateEl = document.getElementById('listenState');
const latencyStateEl = document.getElementById('latencyState');

let pc = null;
let dc = null;
let localStream = null;
let remoteAudio = null;
let assistantDraft = '';
let assistantResponseText = '';
let ttsSocket = null;
let textBuffer = '';
let audioQueue = [];
let isPlaying = false;
let currentAudio = null;
let streamingAudio = null;
let streamingMediaSource = null;
let streamingSourceBuffer = null;
let streamingQueue = [];
let streamingFinal = false;
let latency = {};
let usingElevenLabs = true;
let pendingTtsMessages = [];
let ttsTransport = 'http';
let ttsHttpChain = Promise.resolve();
let ttsGenerationId = 0;
const TTS_STREAM_URL = 'wss://zeppo-dk.onrender.com/api/tts-stream';

function setStatus(text, state = '') {
  statusEl.textContent = text;
  statusEl.className = `status ${state}`.trim();
}

function setDebug(openai, tts, listening) {
  if (openai) openaiStateEl.textContent = openai;
  if (tts) ttsStateEl.textContent = tts;
  if (listening) listenStateEl.textContent = listening;
}

function markLatency(name) {
  if (latency[name]) return;
  latency[name] = performance.now();
  console.log(`[latency] ${name}`, Math.round(latency[name]));
}

function reportLatency() {
  const parts = [];
  if (latency.speechStopped && latency.firstOpenaiText) {
    parts.push(`speech->text ${Math.round(latency.firstOpenaiText - latency.speechStopped)}ms`);
  }
  if (latency.firstOpenaiText && latency.firstElevenAudio) {
    parts.push(`text->tts ${Math.round(latency.firstElevenAudio - latency.firstOpenaiText)}ms`);
  }
  if (latency.firstElevenAudio && latency.playbackStart) {
    parts.push(`tts->play ${Math.round(latency.playbackStart - latency.firstElevenAudio)}ms`);
  }
  if (latency.speechStopped && latency.playbackStart) {
    parts.push(`total ${Math.round(latency.playbackStart - latency.speechStopped)}ms`);
  }
  latencyStateEl.textContent = parts.join(' | ') || '-';
  if (parts.length) console.log('[latency]', parts.join(' | '));
}

function resetTurnLatency() {
  latency = {};
  latencyStateEl.textContent = '-';
}

function markElevenTextSentFirst() {
  if (latency.elevenTextSentFirst) return;
  markLatency('elevenTextSentFirst');
  console.log('[tts] eleven_ws_text_sent_first');
}

function clearTranscript() {
  transcriptEl.innerHTML = '<div class="empty">Samtalen vises her.</div>';
  assistantDraft = '';
  assistantResponseText = '';
}

function removeEmptyState() {
  const empty = transcriptEl.querySelector('.empty');
  if (empty) empty.remove();
}

function addMessage(role, text) {
  if (!text) return;
  removeEmptyState();
  const item = document.createElement('div');
  item.className = `msg ${role}`;
  item.innerHTML = `<div class="role">${role === 'user' ? 'Du' : 'Anja'}</div><div class="text"></div>`;
  item.querySelector('.text').textContent = text;
  transcriptEl.appendChild(item);
  transcriptEl.scrollTop = transcriptEl.scrollHeight;
}

function addAssistantDelta(delta) {
  if (!delta) return;
  removeEmptyState();
  assistantDraft += delta;
  let current = transcriptEl.querySelector('.msg.assistant.draft');
  if (!current) {
    current = document.createElement('div');
    current.className = 'msg assistant draft';
    current.innerHTML = '<div class="role">Anja</div><div class="text"></div>';
    transcriptEl.appendChild(current);
  }
  current.querySelector('.text').textContent = assistantDraft;
  transcriptEl.scrollTop = transcriptEl.scrollHeight;
}

function finishAssistantDraft() {
  const current = transcriptEl.querySelector('.msg.assistant.draft');
  if (current) current.classList.remove('draft');
  assistantDraft = '';
}

function connectTtsSocket() {
  if (!usingElevenLabs || ttsTransport === 'http') return;
  if (ttsSocket && (ttsSocket.readyState === WebSocket.OPEN || ttsSocket.readyState === WebSocket.CONNECTING)) return;

  ttsSocket = new WebSocket(TTS_STREAM_URL);
  setDebug(null, 'connecting');

  ttsSocket.onopen = () => {
    console.log('[tts] client_ws_open', TTS_STREAM_URL);
    setDebug(null, 'connected');
    ttsSocket.send(JSON.stringify({ type: 'start' }));
    while (pendingTtsMessages.length > 0) {
      ttsSocket.send(JSON.stringify(pendingTtsMessages.shift()));
    }
  };

  ttsSocket.onmessage = (message) => {
    let event;
    try {
      event = JSON.parse(message.data);
    } catch {
      return;
    }

    if (event.type === 'ready') {
      console.log('[tts] eleven_ws_open', event);
      setDebug(null, 'ready');
      return;
    }

    if (event.type === 'audio' && event.audio) {
      if (!latency.firstElevenAudio) {
        markLatency('firstElevenAudio');
        console.log('[tts] eleven_ws_audio_first');
        reportLatency();
      }
      enqueueAudioChunk(event.audio);
      return;
    }

    if (event.type === 'final') {
      finishStreamingAudio();
      return;
    }

    if (event.type === 'closed') {
      console.warn('[tts] eleven_ws_close', {
        code: event.code,
        reason: event.reason,
      });
      setDebug(null, 'closed');
      return;
    }

    if (event.type === 'error') {
      setDebug(null, 'error');
      setStatus(`ElevenLabs fejl: ${event.error}`, 'error');
      console.error('[tts] eleven_ws_error', event);
    }
  };

  ttsSocket.onclose = (event) => {
    console.warn('[tts] client_ws_close', {
      code: event.code,
      reason: event.reason,
      wasClean: event.wasClean,
    });
    if (usingElevenLabs && ttsTransport === 'ws') {
      setDebug(null, 'closed');
      setStatus(`ElevenLabs WebSocket lukket (${event.code || 'unknown'}). Se console.`, 'error');
    } else {
      setDebug(null, 'closed');
    }
  };
  ttsSocket.onerror = (error) => {
    console.error('[tts] client_ws_error', error);
    fallbackToHttpTts('WebSocket failed');
  };
}

function sendTts(type, payload = {}) {
  if (!usingElevenLabs) return;
  const message = { type, ...payload };

  if (ttsTransport === 'http') {
    if (type === 'text') sendTtsHttp(payload.text);
    return;
  }

  connectTtsSocket();
  if (ttsSocket?.readyState === WebSocket.OPEN) {
    ttsSocket.send(JSON.stringify(message));
  } else {
    pendingTtsMessages.push(message);
  }
}

function fallbackToHttpTts(reason) {
  if (ttsTransport === 'http') return;
  console.warn('[tts] fallback_http_started', { reason });
  ttsTransport = 'http';
  setDebug(null, 'http fallback');
  setStatus(`ElevenLabs WebSocket fejl: ${reason}. Bruger HTTP fallback.`, 'error');

  const queued = pendingTtsMessages;
  pendingTtsMessages = [];
  queued.forEach((message) => {
    if (message.type === 'text') sendTtsHttp(message.text);
  });
}

function sendTtsHttp(text) {
  const cleanText = (text || '').trim();
  if (!cleanText) return;
  const generation = ttsGenerationId;

  ttsHttpChain = ttsHttpChain
    .catch(() => {})
    .then(async () => {
      setDebug(null, 'http');
      const response = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: cleanText }),
      });

      if (!response.ok) {
        const detail = await response.text();
        throw new Error(`HTTP TTS failed ${response.status}: ${detail}`);
      }

      if (generation !== ttsGenerationId) return;
      if (!latency.firstElevenAudio) {
        markLatency('firstElevenAudio');
        reportLatency();
      }

      console.log('[tts] fallback_http_audio_received');
      enqueueAudioBlob(await response.blob());
    })
    .catch((error) => {
      setDebug(null, 'error');
      setStatus(`ElevenLabs fejl: ${error.message}`, 'error');
      console.error('HTTP TTS error:', error);
    });
}

function shouldFlushText(value) {
  const trimmed = value.trim();
  return /[.?!]\s*$/.test(trimmed) || trimmed.length >= 80;
}

function sendTextDeltaToTts(delta) {
  if (!usingElevenLabs || !delta) return;
  assistantResponseText += delta;

  if (ttsTransport === 'http') {
    if (!latency.firstOpenaiText) {
      markLatency('firstOpenaiText');
      reportLatency();
    }
    return;
  }

  textBuffer += delta;

  if (!latency.firstOpenaiText) {
    markLatency('firstOpenaiText');
    reportLatency();
  }

  if (shouldFlushText(textBuffer)) {
    const text = textBuffer;
    textBuffer = '';
    markElevenTextSentFirst();
    sendTts('text', { text });
    console.log('[tts] text chunk', text);
  }
}

function flushTtsText() {
  if (!usingElevenLabs) return;

  if (ttsTransport === 'http') {
    const text = assistantResponseText.trim();
    assistantResponseText = '';
    textBuffer = '';
    if (text) {
      markLatency('elevenTextSentFirst');
      console.log('[tts] full response', text);
      sendTtsHttp(text);
    }
    return;
  }

  if (textBuffer.trim()) {
    markElevenTextSentFirst();
    console.log('[tts] text chunk', textBuffer);
    sendTts('text', { text: textBuffer });
    textBuffer = '';
  }
  sendTts('flush');
}

function enqueueAudioChunk(base64Audio) {
  const bytes = Uint8Array.from(atob(base64Audio), (char) => char.charCodeAt(0));
  if (ttsTransport === 'ws' && 'MediaSource' in window && MediaSource.isTypeSupported('audio/mpeg')) {
    appendStreamingAudio(bytes);
    return;
  }
  audioQueue.push(new Blob([bytes], { type: 'audio/mpeg' }));
  playNextChunk();
}

function appendStreamingAudio(bytes) {
  if (!streamingAudio) startStreamingAudio();
  streamingQueue.push(bytes);
  pumpStreamingAudio();
}

function startStreamingAudio() {
  streamingFinal = false;
  streamingQueue = [];
  streamingMediaSource = new MediaSource();
  streamingAudio = new Audio(URL.createObjectURL(streamingMediaSource));
  currentAudio = streamingAudio;

  streamingAudio.onplay = () => {
    if (!latency.playbackStart) {
      markLatency('playbackStart');
      reportLatency();
    }
    setDebug(null, 'speaking');
  };
  streamingAudio.onended = () => {
    cleanupStreamingAudio();
    setDebug(null, 'ready');
  };
  streamingAudio.onerror = () => {
    cleanupStreamingAudio();
    playNextChunk();
  };
  streamingMediaSource.addEventListener('sourceopen', () => {
    streamingSourceBuffer = streamingMediaSource.addSourceBuffer('audio/mpeg');
    streamingSourceBuffer.mode = 'sequence';
    streamingSourceBuffer.addEventListener('updateend', pumpStreamingAudio);
    pumpStreamingAudio();
  }, { once: true });
  streamingAudio.play().catch((error) => {
    console.error('ElevenLabs streaming playback error:', error);
  });
}

function pumpStreamingAudio() {
  if (!streamingSourceBuffer || streamingSourceBuffer.updating) return;
  if (streamingQueue.length > 0) {
    streamingSourceBuffer.appendBuffer(streamingQueue.shift());
    return;
  }
  if (streamingFinal && streamingMediaSource?.readyState === 'open') {
    try {
      streamingMediaSource.endOfStream();
    } catch {}
  }
}

function finishStreamingAudio() {
  streamingFinal = true;
  pumpStreamingAudio();
}

function cleanupStreamingAudio() {
  const audio = streamingAudio;
  if (audio?.src) URL.revokeObjectURL(audio.src);
  streamingAudio = null;
  streamingMediaSource = null;
  streamingSourceBuffer = null;
  streamingQueue = [];
  streamingFinal = false;
  if (currentAudio === audio) currentAudio = null;
}

function enqueueAudioBlob(blob) {
  audioQueue.push(blob);
  playNextChunk();
}

function playNextChunk() {
  if (isPlaying || audioQueue.length === 0) return;
  isPlaying = true;
  const blob = audioQueue.shift();
  const url = URL.createObjectURL(blob);
  currentAudio = new Audio(url);

  currentAudio.onplay = () => {
    if (!latency.playbackStart) {
      markLatency('playbackStart');
      reportLatency();
    }
    setDebug(null, 'speaking');
  };
  currentAudio.onended = () => {
    URL.revokeObjectURL(url);
    isPlaying = false;
    currentAudio = null;
    if (audioQueue.length === 0) setDebug(null, 'ready');
    playNextChunk();
  };
  currentAudio.onerror = () => {
    URL.revokeObjectURL(url);
    isPlaying = false;
    currentAudio = null;
    playNextChunk();
  };
  currentAudio.play().catch((error) => {
    console.error('ElevenLabs playback error:', error);
    isPlaying = false;
    currentAudio = null;
  });
}

function stopCurrentPlayback() {
  ttsGenerationId += 1;
  audioQueue = [];
  if (streamingAudio) streamingAudio.pause();
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.src = '';
    currentAudio = null;
  }
  cleanupStreamingAudio();
  isPlaying = false;
  textBuffer = '';
  assistantResponseText = '';
  pendingTtsMessages = [];
  setDebug(null, 'ready');
}

function handleRealtimeEvent(event) {
  console.log('[openai:event]', event.type, event);

  if (event.type === 'input_audio_buffer.speech_started') {
    markLatency('speechStarted');
    setDebug(null, null, 'listening');
    stopCurrentPlayback();
    return;
  }

  if (event.type === 'input_audio_buffer.speech_stopped') {
    resetTurnLatency();
    markLatency('speechStopped');
    setDebug(null, null, 'thinking');
    return;
  }

  if (event.type === 'conversation.item.input_audio_transcription.completed') {
    addMessage('user', event.transcript);
    return;
  }

  if (
    event.type === 'response.text.delta' ||
    event.type === 'response.output_text.delta' ||
    event.type === 'response.audio_transcript.delta' ||
    event.type === 'response.output_audio_transcript.delta'
  ) {
    addAssistantDelta(event.delta);
    sendTextDeltaToTts(event.delta);
    return;
  }

  if (
    event.type === 'response.text.done' ||
    event.type === 'response.output_text.done' ||
    event.type === 'response.output_audio_transcript.done' ||
    event.type === 'response.audio_transcript.done' ||
    event.type === 'response.done'
  ) {
    finishAssistantDraft();
    flushTtsText();
    return;
  }

  if (event.type === 'error') {
    setStatus(event.error?.message || 'Realtime fejl', 'error');
  }
}

async function startSession() {
  try {
    usingElevenLabs = voiceModeEl.value === 'elevenlabs';
    startBtn.disabled = true;
    stopBtn.disabled = false;
    clearTranscript();
    latency = {};
    ttsTransport = usingElevenLabs ? 'ws' : 'off';
    ttsGenerationId += 1;
    latencyStateEl.textContent = '-';
    setStatus('Forbinder til Anja...', 'loading');
    setDebug('connecting', usingElevenLabs ? 'connecting' : 'off', 'idle');
    if (usingElevenLabs) connectTtsSocket();

    pc = new RTCPeerConnection();
    remoteAudio = new Audio();
    remoteAudio.autoplay = true;
    pc.ontrack = (event) => {
      if (usingElevenLabs) {
        console.log('Ignoring OpenAI audio track because ElevenLabs mode is active.');
        return;
      }
      remoteAudio.srcObject = event.streams[0];
      remoteAudio.play().catch((error) => console.log('OpenAI playback error:', error));
    };

    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    localStream.getAudioTracks().forEach((track) => pc.addTrack(track, localStream));

    dc = pc.createDataChannel('oai-events');
    dc.onopen = () => {
      setStatus('Forbundet', 'connected');
      setDebug('connected');
      dc.send(JSON.stringify({
        type: 'response.create',
        response: {
          instructions: 'Start samtalen nu med præcis én kort velkomst på dansk.',
        },
      }));
    };
    dc.onmessage = (message) => {
      try {
        handleRealtimeEvent(JSON.parse(message.data));
      } catch (error) {
        console.log('Realtime event parse error:', error);
      }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    const response = await fetch(`/api/realtime/call?voice=${usingElevenLabs ? 'elevenlabs' : 'openai'}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/sdp' },
      body: offer.sdp,
    });

    if (!response.ok) {
      const text = await response.text();
      throw new Error(`Realtime connection failed: ${response.status} ${text}`);
    }

    const answer = { type: 'answer', sdp: await response.text() };
    await pc.setRemoteDescription(answer);
  } catch (error) {
    stopSession(false);
    setStatus(`Fejl: ${error.message}`, 'error');
    startBtn.disabled = false;
  }
}

function stopSession(resetText = true) {
  sendTts('end');
  if (ttsSocket) ttsSocket.close();
  if (dc) dc.close();
  if (pc) pc.close();
  if (localStream) localStream.getTracks().forEach((track) => track.stop());
  if (remoteAudio) remoteAudio.pause();
  stopCurrentPlayback();

  dc = null;
  pc = null;
  localStream = null;
  remoteAudio = null;
  ttsSocket = null;

  startBtn.disabled = false;
  stopBtn.disabled = true;
  setDebug('idle', 'idle', 'idle');
  if (resetText) {
    setStatus('Klar til at starte');
    clearTranscript();
  }
}

startBtn.addEventListener('click', startSession);
stopBtn.addEventListener('click', () => stopSession());
</script>
</body>
</html>
