<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontakt os — Zeppo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --g: #16a34a;
  --gm: #15803d;
  --black: #0a0a08;
  --ink: #18181b;
  --mid: #52525b;
  --border: #e4e4e7;
  --white: #ffffff;
  --ff: 'Fraunces', Georgia, serif;
  --fb: 'DM Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  height: 100vh;
  overflow: hidden;
  font-family: var(--fb);
  color: var(--ink);
  background:
    radial-gradient(ellipse 70% 45% at 50% 0%, rgba(22,163,74,.06), transparent 62%),
    var(--white);
  -webkit-font-smoothing: antialiased;
}

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 60px; padding: 0 40px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(24px) saturate(200%);
  border-bottom: 1px solid rgba(228,228,231,0.6);
}

.logo { font-family: var(--ff); font-size: 21px; font-weight: 700; color: var(--g); text-decoration: none; letter-spacing: -.04em; }
.logo-dot { color: var(--ink); }
.nav-link { color: var(--mid); text-decoration: none; font-size: 14px; font-weight: 400; }
.nav-link:hover { color: var(--ink); }

main {
  height: 100vh;
  padding: 84px 24px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.contact-frame {
  width: min(820px, 100%);
  max-height: calc(100vh - 108px);
  border: 1px solid var(--border);
  border-radius: 16px;
  background: rgba(255,255,255,.94);
  padding: 30px;
  box-shadow: 0 22px 70px rgba(0,0,0,0.08);
}

h1 {
  max-width: 680px;
  margin: 0 auto 12px;
  font-family: var(--ff);
  color: var(--black);
  font-size: clamp(40px, 5vw, 64px);
  font-weight: 300;
  line-height: .98;
  letter-spacing: -.05em;
  text-align: center;
}

h1 em { color: var(--g); font-style: italic; font-weight: 700; }
.page-sub {
  max-width: 520px;
  margin: 0 auto 24px;
  color: var(--mid);
  font-size: 17px;
  font-weight: 300;
  line-height: 1.75;
  text-align: center;
}

.form-box {
  width: 100%;
  max-width: 680px;
  margin: 0 auto;
}

.form-box h2 {
  color: var(--black);
  font-family: var(--ff);
  font-size: 28px;
  font-weight: 600;
  line-height: 1.15;
  letter-spacing: -.03em;
  margin-bottom: 8px;
}

.form-box > p {
  color: var(--mid);
  font-size: 15px;
  font-weight: 300;
  line-height: 1.6;
  margin-bottom: 18px;
}

form { display: grid; gap: 12px; }
.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

label {
  display: grid;
  gap: 7px;
  color: var(--mid);
  font-size: 13px;
  font-weight: 600;
}

input, textarea {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--white);
  color: var(--black);
  font: inherit;
  font-size: 14px;
  outline: none;
  padding: 11px 12px;
  transition: border-color .15s, box-shadow .15s;
}

textarea {
  min-height: 84px;
  resize: vertical;
}

input:focus, textarea:focus {
  border-color: var(--g);
  box-shadow: 0 0 0 3px rgba(22,163,74,0.12);
}

button {
  min-height: 44px;
  border: none;
  border-radius: 8px;
  background: var(--g);
  color: var(--white);
  font: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s, transform .15s;
}

button:hover { background: var(--gm); transform: translateY(-1px); }
button:disabled { cursor: not-allowed; opacity: .7; transform: none; }
.status { min-height: 22px; color: var(--mid); font-size: 13px; line-height: 1.5; }
.status.ok { color: #15803d; }
.status.error { color: #b42318; }
.fine { margin-top: 18px; color: var(--mid); font-size: 13px; line-height: 1.5; }

@media (max-width: 900px) {
  nav { padding: 0 20px; }
  main { padding: 80px 14px 14px; }
  .contact-frame { padding: 20px; max-height: calc(100vh - 94px); }
  h1 { font-size: 38px; }
  .page-sub { font-size: 14px; line-height: 1.45; margin-bottom: 16px; }
  .row { grid-template-columns: 1fr; }
  textarea { min-height: 70px; }
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">zeppo<span class="logo-dot">.</span></a>
  <a href="index.html" class="nav-link">Tilbage til forsiden</a>
</nav>

<main>
  <section class="contact-frame">
    <h1>Kontakt os om <em>Zeppo.</em></h1>
    <p class="page-sub">Skriv dine oplysninger her, så vender jeg tilbage og viser, hvordan Zeppo kan hjælpe dit VVS-firma med at tage flere opkald.</p>

    <div class="form-box">
      <h2>Book en demo</h2>
      <p>Udfyld formularen, så kontakter jeg dig hurtigst muligt.</p>
      <form id="demoForm" action="https://formspree.io/f/xzdwkvzq" method="POST">
        <div class="row">
          <label>
            Navn
            <input name="name" autocomplete="name" required>
          </label>
          <label>
            Firma
            <input name="company" autocomplete="organization" required>
          </label>
        </div>
        <div class="row">
          <label>
            Telefon
            <input name="phone" autocomplete="tel" required>
          </label>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required>
          </label>
        </div>
        <label>
          Besked
          <textarea name="message" placeholder="Fortæl kort hvornår det passer dig, eller hvad du gerne vil se i demoen."></textarea>
        </label>
        <button type="submit">Send forespørgsel</button>
        <div class="status" id="status"></div>
      </form>
      <p class="fine">Du får svar inden for 24 timer på hverdage.</p>
    </div>
  </section>
</main>

</body>
</html>
